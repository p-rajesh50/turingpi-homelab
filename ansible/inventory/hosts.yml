---
# ansible/inventory/hosts.yml
# Confirmed slot mapping — DO NOT change bmc_slot values
#   Slot 1 → RK1  → rk1-control   (Kubernetes control plane)
#   Slot 2 → Orin NX → orin-nx    (LLM inference)
#   Slot 3 → RK1  → rk1-worker-1  (Kubernetes worker)
#   Slot 4 → RK1  → rk1-worker-2  (Kubernetes worker + NFS server)
#   Standalone → jetson-nano       (Embedding server)

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/turingpi_homelab
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  children:

    # ── Cluster 1: RK1 Kubernetes nodes ────────────────────────────────────
    rk1_nodes:
      children:

        k8s_control:
          hosts:
            rk1-control:
              ansible_host: 10.0.0.11
              bmc_slot: 1
              k8s_role: control-plane

        k8s_workers:
          hosts:
            rk1-worker-1:
              ansible_host: 10.0.0.12
              bmc_slot: 3
              k8s_role: worker

            rk1-worker-2:
              ansible_host: 10.0.0.13
              bmc_slot: 4
              k8s_role: worker
              nfs_server: true          # hosts NFS export on /dev/sda
              storage_device_sata: /dev/sda
              storage_device_nvme: /dev/nvme0n1

    # ── Cluster 1: Nvidia Orin NX (slot 2) ─────────────────────────────────
    jetson_orin:
      hosts:
        orin-nx:
          ansible_host: 10.0.0.14
          bmc_slot: 2
          jetpack_version: "7"
          storage_device_nvme: /dev/nvme0n1

    # ── Standalone: Nvidia Jetson Nano ──────────────────────────────────────
    jetson_nano:
      hosts:
        jetson-nano:
          ansible_host: 10.0.0.15
          jetpack_version: "4.6"        # Latest JetPack for Nano

    # ── All Jetson/GPU nodes ────────────────────────────────────────────────
    jetson_nodes:
      children:
        jetson_orin:
        jetson_nano:

    # ── Logical groupings for playbooks ────────────────────────────────────
    k8s_cluster:
      children:
        k8s_control:
        k8s_workers:

    cluster1:
      children:
        rk1_nodes:
        jetson_orin:
