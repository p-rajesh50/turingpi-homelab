---
# ansible/roles/cloudflare-tunnel/tasks/main.yml
# Deploys Cloudflare Tunnel (cloudflared) as a K8s Deployment.
# Creates DNS records automatically for all exposed services.
# No ports need to be opened on your home router.
#
# Exposes these services at kloud-worx.com:
#   vault.kloud-worx.com      → HashiCorp Vault UI
#   grafana.kloud-worx.com    → Grafana monitoring
#   jupyter.kloud-worx.com    → JupyterHub
#   gitea.kloud-worx.com      → Gitea self-hosted Git
#   litellm.kloud-worx.com    → LiteLLM API gateway
#   minio.kloud-worx.com      → MinIO S3 console
#   headlamp.kloud-worx.com   → Headlamp K8s UI
#   portainer.kloud-worx.com  → Portainer multi-cluster UI
#
# PREREQUISITE: Cloudflare tunnel token stored in Vault:
#   vault kv put secret/cloudflare \
#     TUNNEL_TOKEN="..." \
#     API_TOKEN="..." \
#     ZONE_ID="..." \
#     ACCOUNT_ID="..."

- name: Create cloudflare-tunnel namespace
  ansible.builtin.shell: >
    kubectl create namespace cloudflare-tunnel --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [tunnel]

- name: Deploy cloudflared tunnel config
  ansible.builtin.copy:
    dest: /tmp/cloudflared.yml
    mode: "0644"
    content: |
      ---
      # ConfigMap with tunnel routing rules
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cloudflared-config
        namespace: cloudflare-tunnel
      data:
        config.yaml: |
          tunnel: homelab
          credentials-file: /etc/cloudflared/creds/credentials.json
          metrics: 0.0.0.0:2000
          no-autoupdate: true

          ingress:
            # Vault secrets management UI
            - hostname: vault.kloud-worx.com
              service: http://vault.vault.svc.cluster.local:8200

            # Grafana monitoring
            - hostname: grafana.kloud-worx.com
              service: http://monitoring-grafana.monitoring.svc.cluster.local:80

            # JupyterHub notebooks
            - hostname: jupyter.kloud-worx.com
              service: http://proxy-public.jupyterhub.svc.cluster.local:80

            # Gitea self-hosted Git
            - hostname: gitea.kloud-worx.com
              service: http://gitea-http.gitea.svc.cluster.local:3000

            # Open WebUI — DEFERRED, Orin NX module removed from the board (see
            # CLAUDE.md Hardware section). Re-add the llm.kloud-worx.com route
            # here once Orin NX is reinstalled and Open WebUI is deployed.

            # LiteLLM AI Gateway API
            - hostname: litellm.kloud-worx.com
              service: http://litellm.litellm.svc.cluster.local:80

            # MinIO S3 Console
            - hostname: minio.kloud-worx.com
              service: http://minio.minio.svc.cluster.local:9001

            # Prefect orchestration UI
            - hostname: prefect.kloud-worx.com
              service: http://prefect-server.prefect.svc.cluster.local:4200

            # Headlamp Kubernetes UI
            - hostname: headlamp.kloud-worx.com
              service: http://headlamp.headlamp.svc.cluster.local:80

            # Portainer multi-cluster UI
            - hostname: portainer.kloud-worx.com
              service: http://portainer.portainer.svc.cluster.local:9000

            # Catch-all
            - service: http_status:404

      ---
      # Deployment — runs 2 replicas for reliability
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cloudflared
        namespace: cloudflare-tunnel
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: cloudflared
        template:
          metadata:
            labels:
              app: cloudflared
          spec:
            containers:
              - name: cloudflared
                image: cloudflare/cloudflared:latest
                args:
                  - tunnel
                  - --config
                  - /etc/cloudflared/config/config.yaml
                  - run
                env:
                  - name: TUNNEL_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: cloudflare-secrets
                        key: TUNNEL_TOKEN
                volumeMounts:
                  - name: config
                    mountPath: /etc/cloudflared/config
                    readOnly: true
                resources:
                  requests:
                    memory: 64Mi
                    cpu: 50m
                  limits:
                    memory: 128Mi
                    cpu: 200m
                livenessProbe:
                  httpGet:
                    path: /ready
                    port: 2000
                  initialDelaySeconds: 10
            volumes:
              - name: config
                configMap:
                  name: cloudflared-config
  tags: [tunnel]

- name: Apply cloudflared deployment
  ansible.builtin.command: kubectl apply -f /tmp/cloudflared.yml
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [tunnel]

- name: Print Cloudflare Tunnel summary
  ansible.builtin.debug:
    msg:
      - "Cloudflare Tunnel deployed — services now accessible at:"
      - "  https://vault.kloud-worx.com      ← Vault UI"
      - "  https://grafana.kloud-worx.com    ← Grafana"
      - "  https://jupyter.kloud-worx.com    ← JupyterHub"
      - "  https://gitea.kloud-worx.com      ← Gitea"
      - "  https://litellm.kloud-worx.com    ← LiteLLM API"
      - "  https://minio.kloud-worx.com      ← MinIO Console"
      - "  https://prefect.kloud-worx.com    ← Prefect UI"
      - "  https://headlamp.kloud-worx.com   ← Headlamp K8s UI"
      - "  https://portainer.kloud-worx.com  ← Portainer multi-cluster UI"
      - "All protected by Cloudflare Access (Google OAuth login required)"
  tags: [tunnel]

# --- Cloudflare API credentials (shared by DNS + Access sections below) ---

- name: Create cloudflare-api-credentials ExternalSecret
  ansible.builtin.copy:
    dest: /tmp/cloudflare-api-external-secret.yml
    mode: "0644"
    content: |
      ---
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: cloudflare-api-credentials
        namespace: cloudflare-tunnel
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: cloudflare-api-credentials
          creationPolicy: Owner
        data:
          - secretKey: API_TOKEN
            remoteRef:
              key: secret/cloudflare
              property: API_TOKEN
          - secretKey: ACCOUNT_ID
            remoteRef:
              key: secret/cloudflare
              property: ACCOUNT_ID
          - secretKey: ZONE_ID
            remoteRef:
              key: secret/cloudflare
              property: ZONE_ID
  tags: [credentials]

- name: Apply cloudflare-api-credentials ExternalSecret
  ansible.builtin.command: kubectl apply -f /tmp/cloudflare-api-external-secret.yml
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [credentials]

- name: Wait for cloudflare-api-credentials secret to sync from Vault
  ansible.builtin.command: >
    kubectl wait externalsecret/cloudflare-api-credentials -n cloudflare-tunnel
    --for=condition=Ready --timeout=90s
  changed_when: false
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [credentials]

- name: Read Cloudflare API token from synced secret
  ansible.builtin.shell: >
    kubectl get secret cloudflare-api-credentials -n cloudflare-tunnel
    -o jsonpath='{.data.API_TOKEN}' | base64 --decode
  args:
    executable: /bin/bash
  register: cf_api_token_raw
  changed_when: false
  no_log: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [credentials]

- name: Read Cloudflare Account ID from synced secret
  ansible.builtin.shell: >
    kubectl get secret cloudflare-api-credentials -n cloudflare-tunnel
    -o jsonpath='{.data.ACCOUNT_ID}' | base64 --decode
  args:
    executable: /bin/bash
  register: cf_account_id_raw
  changed_when: false
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [credentials]

- name: Read Cloudflare Zone ID from synced secret
  ansible.builtin.shell: >
    kubectl get secret cloudflare-api-credentials -n cloudflare-tunnel
    -o jsonpath='{.data.ZONE_ID}' | base64 --decode
  args:
    executable: /bin/bash
  register: cf_zone_id_raw
  changed_when: false
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
  tags: [credentials]

- name: Set Cloudflare API facts
  ansible.builtin.set_fact:
    cf_api_token: "{{ cf_api_token_raw.stdout }}"
    cf_account_id: "{{ cf_account_id_raw.stdout }}"
    cf_zone_id: "{{ cf_zone_id_raw.stdout }}"
  no_log: true
  tags: [credentials]

# --- Cloudflare DNS records ---
# Points each tunnel hostname at the tunnel via a proxied CNAME.

- name: Print Cloudflare DNS prerequisite warning
  ansible.builtin.debug:
    msg:
      - "PREREQUISITE: the Cloudflare API token must also have Zone > DNS > Edit permission (scoped to kloud-worx.com)."
  tags: [dns]

- name: Look up Cloudflare Tunnel ID
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cf_account_id }}/cfd_tunnel"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_api_token }}"
    status_code: [200]
  register: cf_tunnels
  no_log: true
  tags: [dns]

- name: Resolve Cloudflare Tunnel ID matches
  ansible.builtin.set_fact:
    cf_tunnel_matches: "{{ cf_tunnels.json.result | selectattr('name', 'equalto', cloudflare_tunnel_name) | list }}"
  tags: [dns]

- name: Assert Cloudflare Tunnel was found
  ansible.builtin.assert:
    that:
      - cf_tunnel_matches | length > 0
    fail_msg: >-
      No Cloudflare Tunnel named '{{ cloudflare_tunnel_name }}' found in this account.
      Check cloudflare_tunnel_name matches the tunnel's actual name in Cloudflare.
  tags: [dns]

- name: Set Cloudflare Tunnel ID fact
  ansible.builtin.set_fact:
    cf_tunnel_id: "{{ cf_tunnel_matches[0].id }}"
  tags: [dns]

- name: Look up existing DNS records
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cf_zone_id }}/dns_records?per_page=100"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_api_token }}"
    status_code: [200]
  register: cf_all_dns_records
  no_log: true
  tags: [dns]

- name: Provision CNAME record for each tunnel hostname
  ansible.builtin.include_tasks: dns-record.yml
  loop: "{{ cloudflare_tunnel_hostnames }}"
  loop_control:
    loop_var: cf_hostname
  tags: [dns]

# --- Cloudflare Access (Zero Trust) ---
# This section only wires up Access Applications/Policies for the hostnames
# above; it does not configure the identity provider itself. cf_api_token and
# cf_account_id were already set in the credentials section above.

- name: Print Cloudflare Access prerequisite warning
  ansible.builtin.debug:
    msg:
      - "PREREQUISITE: Google IdP must be configured in Cloudflare Zero Trust before running this playbook."
      - "Team domain: {{ cloudflare_zero_trust_team_domain }}"
  tags: [access]

- name: Look up Cloudflare Zero Trust identity providers
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cf_account_id }}/access/identity_providers"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_api_token }}"
    status_code: [200]
  register: cf_idps
  no_log: true
  tags: [access]

- name: Resolve Google IdP ID
  ansible.builtin.set_fact:
    cf_google_idp_matches: "{{ cf_idps.json.result | selectattr('name', 'equalto', cloudflare_access_idp_name) | list }}"
  tags: [access]

- name: Assert Google IdP was found
  ansible.builtin.assert:
    that:
      - cf_google_idp_matches | length > 0
    fail_msg: >-
      No identity provider named '{{ cloudflare_access_idp_name }}' found in
      Cloudflare Zero Trust. Configure it first at
      https://{{ cloudflare_zero_trust_team_domain }}.
  tags: [access]

- name: Set Google IdP ID fact
  ansible.builtin.set_fact:
    cf_google_idp_id: "{{ cf_google_idp_matches[0].id }}"
  tags: [access]

- name: Look up existing Cloudflare Access Applications
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cf_account_id }}/access/apps"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_api_token }}"
    status_code: [200]
  register: cf_all_apps
  no_log: true
  tags: [access]

- name: Provision Cloudflare Access application + policy for each hostname
  ansible.builtin.include_tasks: access-app.yml
  loop: "{{ cloudflare_access_hostnames }}"
  loop_control:
    loop_var: cf_hostname
  tags: [access]

- name: Print Cloudflare Access summary
  ansible.builtin.debug:
    msg:
      - "Cloudflare Access now protects:"
      - "{{ cloudflare_access_hostnames }}"
      - "Allowed identity: {{ cloudflare_access_allowed_email }} via {{ cloudflare_access_idp_name }}"
      - "Session duration: {{ cloudflare_access_session_duration }}"
  tags: [access]
