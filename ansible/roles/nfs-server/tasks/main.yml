---
# Only runs on the node with nfs_server: true (rk1-worker-1, slot 3)
# /dev/sda2 is a pre-existing 476.4G partition on the SATA SSD — no partitioning needed

- name: Skip if not NFS server
  ansible.builtin.meta: end_host
  when: not (nfs_server | default(false))

- name: Install NFS server
  ansible.builtin.apt:
    name: [nfs-kernel-server, e2fsprogs]
    state: present

- name: Check filesystem type on SATA partition
  ansible.builtin.command: "blkid -s TYPE -o value {{ nfs_sata_device }}"
  register: blkid_result
  changed_when: false
  failed_when: false

- name: Format SATA partition as ext4 (only if not already ext4)
  ansible.builtin.command: "mkfs.ext4 -F {{ nfs_sata_device }}"
  when: blkid_result.stdout | trim != 'ext4'
  changed_when: true

- name: Create SATA mount point
  ansible.builtin.file:
    path: "{{ nfs_sata_mount }}"
    state: directory
    mode: "0755"

- name: Mount SATA partition
  ansible.posix.mount:
    path: "{{ nfs_sata_mount }}"
    src: "{{ nfs_sata_device }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Create NFS export directory on SATA
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Configure NFS export
  ansible.builtin.lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_path }} {{ cluster_subnet }}(rw,sync,no_subtree_check,no_root_squash)"
    state: present
  notify: Export NFS shares

- name: Enable NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started

- name: Allow NFS through UFW
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"
    port: "2049"
    proto: tcp
