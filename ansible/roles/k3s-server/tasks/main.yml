---
- name: Install K3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_KUBECONFIG_MODE="644" \
      sh -s - server \
      --disable traefik \
      --disable servicelb \
      --flannel-backend=none \
      --disable-network-policy \
      --cluster-cidr={{ pod_cidr }} \
      --service-cidr={{ service_cidr }} \
      --node-ip={{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s

- name: Wait for node-token to exist
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Read node-token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token_raw

- name: Share node-token with agent nodes
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k8s_workers'] }}"

- name: Wait for control-plane node to register
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  register: k3s_node_registered
  until: k3s_node_registered.rc == 0
  retries: 24
  delay: 5
  changed_when: false

- name: Fetch kubeconfig to workstation
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/.kube/turingpi-cluster1.conf
    flat: true
  become: false

- name: Point fetched kubeconfig at the real server IP
  ansible.builtin.replace:
    path: "{{ lookup('env', 'HOME') }}/.kube/turingpi-cluster1.conf"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  become: false
  delegate_to: localhost

- name: Allow K3s API server port through UFW
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
