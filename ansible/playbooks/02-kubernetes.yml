---
# ansible/playbooks/02-kubernetes.yml
# Deploys a 3-node Kubernetes cluster on RK1 nodes (slots 1, 3, 4).

# ── Phase 1: OS prep on all RK1 nodes ────────────────────────────────────────
- name: Kubernetes OS prerequisites
  hosts: rk1_nodes
  become: true
  tags: [k8s-prep]

  tasks:
    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Remove swapfile if present
      ansible.builtin.shell: |
        swapoff -a
        rm -f /swapfile
        sed -i '/swapfile/d' /etc/fstab
      changed_when: false

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
        mode: "0644"

    - name: Set sysctl params for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k8s.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Install containerd prerequisites
      ansible.builtin.apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, containerd]
        state: present
        update_cache: true

    - name: Create containerd config dir
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: restarted

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Kubernetes apt key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubeadm kubelet kubectl
      ansible.builtin.apt:
        name: [kubeadm, kubelet, kubectl]
        state: present
        update_cache: true

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubeadm, kubelet, kubectl]

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true

    - name: Install Helm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

# ── Phase 2: Control plane ────────────────────────────────────────────────────
- name: Initialize Kubernetes control plane
  hosts: k8s_control
  become: true
  tags: [k8s-control]
  roles:
    - role: k8s-control

# ── Phase 3: Workers join ─────────────────────────────────────────────────────
- name: Join worker nodes
  hosts: k8s_workers
  become: true
  tags: [k8s-workers]
  roles:
    - role: k8s-worker

# ── Phase 4: CNI ──────────────────────────────────────────────────────────────
- name: Deploy Flannel CNI
  hosts: k8s_control
  become: false
  tags: [k8s-cni]
  tasks:
    - name: Apply Flannel manifest
      ansible.builtin.command: >
        kubectl apply -f
        https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: "/home/{{ admin_user }}/.kube/config"
      changed_when: true
