---
# cluster2/ansible/inventory/hosts.yml
# TuringPi 2 — Raspberry Pi CM4 Cluster (future buildout)
#
# BMC:    tpi2-bmc   10.0.0.20
# Node 1: cm4-node-1 10.0.0.21  (K8s control plane)
# Node 2: cm4-node-2 10.0.0.22  (K8s worker)
# Node 3: cm4-node-3 10.0.0.23  (K8s worker)
# Node 4: cm4-node-4 10.0.0.24  (K8s worker)

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/turingpi_homelab
    ansible_python_interpreter: /usr/bin/python3

  children:
    cm4_nodes:
      children:
        cm4_control:
          hosts:
            cm4-node-1:
              ansible_host: 10.0.0.21
              bmc_slot: 1
              bmc_ip: 10.0.0.20
              k8s_role: control-plane

        cm4_workers:
          hosts:
            cm4-node-2:
              ansible_host: 10.0.0.22
              bmc_slot: 2
              bmc_ip: 10.0.0.20
              k8s_role: worker

            cm4-node-3:
              ansible_host: 10.0.0.23
              bmc_slot: 3
              bmc_ip: 10.0.0.20
              k8s_role: worker

            cm4-node-4:
              ansible_host: 10.0.0.24
              bmc_slot: 4
              bmc_ip: 10.0.0.20
              k8s_role: worker

    k8s_cluster2:
      children:
        cm4_control:
        cm4_workers:
