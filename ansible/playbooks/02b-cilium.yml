---
# ansible/playbooks/02b-cilium.yml
# Installs Cilium as the CNI for the K3s cluster deployed by 02-kubernetes.yml.
# Runs from the workstation (localhost) using the fetched kubeconfig — K3s was started
# with --flannel-backend=none, so nodes are registered but NotReady until this runs.

- name: Install Cilium CNI
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  tags: [k8s-cni]
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/turingpi-cluster1.conf"

  tasks:
    - name: Ensure ~/bin exists for user-local installs
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/bin"
        state: directory
        mode: "0755"

    - name: Install Cilium CLI
      ansible.builtin.shell: |
        set -e
        CLI_ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        CILIUM_CLI_VERSION=$(curl -sL https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L --fail --remote-name-all \
          "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz"
        tar xzvfC "cilium-linux-${CLI_ARCH}.tar.gz" "{{ lookup('env', 'HOME') }}/bin"
        rm -f "cilium-linux-${CLI_ARCH}.tar.gz"
      args:
        creates: "{{ lookup('env', 'HOME') }}/bin/cilium"

    # `cilium install` fails with "cannot reuse a name that is still in use" on
    # any re-run once Cilium is already installed — tolerated here so this
    # playbook stays idempotent (e.g. re-running `make cilium` just to pick up
    # the metrics change below).
    - name: Install Cilium into the cluster
      ansible.builtin.command: >
        cilium install
        --set ipam.mode=kubernetes
        --set kubeProxyReplacement=false
        --set k8sServiceHost={{ k3s_server_ip }}
        --set k8sServicePort=6443
      register: cilium_install_result
      failed_when: >
        cilium_install_result.rc != 0 and
        'cannot reuse a name that is still in use' not in cilium_install_result.stderr
      changed_when: cilium_install_result.rc == 0

    - name: Wait for Cilium to become ready
      ansible.builtin.command: cilium status --wait --wait-duration 5m
      changed_when: false

    # Cilium ships with metrics disabled by default. Enables the cilium-agent
    # and cilium-operator Prometheus endpoints/Services so
    # kubernetes/service-monitors/cilium-servicemonitor.yml has something to
    # scrape. Uses the Cilium CLI's own upgrade command (wraps the same
    # embedded Helm chart `cilium install` uses) since this play runs from the
    # workstation, which has no standalone `helm` binary.
    - name: Enable Cilium and Cilium Operator Prometheus metrics
      ansible.builtin.command: >
        cilium upgrade
        --set prometheus.enabled=true
        --set operator.prometheus.enabled=true
      changed_when: true

    - name: Wait for Cilium to become ready after enabling metrics
      ansible.builtin.command: cilium status --wait --wait-duration 5m
      changed_when: false
