---
# Only runs on the node with nfs_server: true (rk1-worker-1, slot 2)
# /dev/sda2 is a pre-existing ext4 partition (476.4G, labelled "rootfs" from old OS install)
# Confirmed at this path after the slot 3→2 move via mini-PCIe SATA adapter
# No partitioning or formatting needed — mount, wipe old OS content, then export via NFS

- name: Skip if not NFS server
  ansible.builtin.meta: end_host
  when: not (nfs_server | default(false))

- name: Install NFS server
  ansible.builtin.apt:
    name: [nfs-kernel-server, e2fsprogs]
    state: present

- name: Create SATA mount point
  ansible.builtin.file:
    path: "{{ nfs_sata_mount }}"
    state: directory
    mode: "0755"

- name: Mount SATA partition
  ansible.posix.mount:
    path: "{{ nfs_sata_mount }}"
    src: "{{ nfs_sata_device }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Relabel partition from rootfs to nfs-storage
  ansible.builtin.command: "e2label {{ nfs_sata_device }} nfs-storage"
  changed_when: true

- name: Remove old OS content (preserve k8s export dir if it exists)
  ansible.builtin.shell: >
    find {{ nfs_sata_mount }} -mindepth 1 -maxdepth 1
    ! -name 'k8s' -exec rm -rf {} +
  args:
    executable: /bin/bash
  changed_when: true

- name: Create NFS export directory on SATA
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Configure NFS export
  ansible.builtin.lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_path }} {{ cluster_subnet }}(rw,sync,no_subtree_check,no_root_squash)"
    state: present
  notify: Export NFS shares

- name: Enable NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started

- name: Allow NFS through UFW
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"
    port: "2049"
    proto: tcp
