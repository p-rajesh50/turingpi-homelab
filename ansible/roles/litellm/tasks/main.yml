---
# LiteLLM AI Gateway — routes to local Ollama models AND cloud LLM APIs
# API keys are read from Kubernetes Secret 'llm-api-keys' in namespace 'litellm'
# Create keys with: make secrets   or   scripts/secrets/setup-api-keys.sh

- name: Create litellm namespace
  ansible.builtin.shell: kubectl create namespace litellm --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

# Namespace didn't exist yet when the external-secrets role tried to apply
# this ExternalSecret (ignore_errors swallowed the failure), so the
# litellm role creates + waits for its own copy here instead of relying on it.
- name: Create llm-api-keys ExternalSecret
  ansible.builtin.copy:
    dest: /tmp/litellm-external-secret.yml
    mode: "0644"
    content: |
      ---
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: llm-api-keys
        namespace: litellm
      spec:
        refreshInterval: 1m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: llm-api-keys
          creationPolicy: Owner
        data:
          - secretKey: ANTHROPIC_API_KEY
            remoteRef:
              key: secret/llm-keys
              property: ANTHROPIC_API_KEY
          - secretKey: GEMINI_API_KEY
            remoteRef:
              key: secret/llm-keys
              property: GEMINI_API_KEY
          - secretKey: LITELLM_MASTER_KEY
            remoteRef:
              key: secret/llm-keys
              property: LITELLM_MASTER_KEY

- name: Apply llm-api-keys ExternalSecret
  ansible.builtin.command: kubectl apply -f /tmp/litellm-external-secret.yml
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

- name: Wait for llm-api-keys secret to sync from Vault
  ansible.builtin.command: >
    kubectl wait externalsecret/llm-api-keys -n litellm
    --for=condition=Ready --timeout=90s
  changed_when: false
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

- name: Deploy LiteLLM config map
  ansible.builtin.copy:
    dest: /tmp/litellm-config.yml
    mode: "0644"
    content: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: litellm-config
        namespace: litellm
      data:
        config.yaml: |
          model_list:
            # ── Local models via Orin NX (free, private) ──────────────────
            - model_name: gemma3
              litellm_params:
                model: ollama/gemma3:12b
                api_base: http://{{ node_ips.orin_nx }}:{{ ollama_port }}

            - model_name: mistral
              litellm_params:
                model: ollama/mistral
                api_base: http://{{ node_ips.orin_nx }}:{{ ollama_port }}

            - model_name: openchat
              litellm_params:
                model: ollama/openchat
                api_base: http://{{ node_ips.orin_nx }}:{{ ollama_port }}

            - model_name: nomic-embed-text
              litellm_params:
                model: ollama/nomic-embed-text
                api_base: http://{{ node_ips.orin_nx }}:{{ ollama_port }}

            # ── Embedding via Jetson Nano (offloads from Orin NX) ─────────
            - model_name: all-minilm
              litellm_params:
                model: ollama/all-minilm
                api_base: http://{{ node_ips.jetson_nano }}:{{ ollama_port }}

            - model_name: phi3-mini
              litellm_params:
                model: ollama/phi3:mini
                api_base: http://{{ node_ips.jetson_nano }}:{{ ollama_port }}

            # ── Claude via Anthropic API ───────────────────────────────────
            - model_name: claude-sonnet
              litellm_params:
                model: claude-sonnet-4-6
                api_key: os.environ/ANTHROPIC_API_KEY

            - model_name: claude-opus
              litellm_params:
                model: claude-opus-4-6
                api_key: os.environ/ANTHROPIC_API_KEY

            # ── Gemini via Google AI API ───────────────────────────────────
            - model_name: gemini-pro
              litellm_params:
                model: gemini/gemini-1.5-pro
                api_key: os.environ/GEMINI_API_KEY

            - model_name: gemini-flash
              litellm_params:
                model: gemini/gemini-1.5-flash
                api_key: os.environ/GEMINI_API_KEY

          litellm_settings:
            drop_params: true
            success_callback: []

          general_settings:
            master_key: os.environ/LITELLM_MASTER_KEY

- name: Apply LiteLLM config map
  ansible.builtin.command: kubectl apply -f /tmp/litellm-config.yml
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

- name: Deploy LiteLLM Deployment and Service
  ansible.builtin.copy:
    dest: /tmp/litellm-deploy.yml
    mode: "0644"
    content: |
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: litellm
        namespace: litellm
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: litellm
        template:
          metadata:
            labels:
              app: litellm
          spec:
            containers:
              - name: litellm
                image: ghcr.io/berriai/litellm:main-latest
                ports:
                  - containerPort: 4000
                args: ["--config", "/app/config.yaml", "--port", "4000"]
                volumeMounts:
                  - name: config
                    mountPath: /app/config.yaml
                    subPath: config.yaml
                envFrom:
                  - secretRef:
                      name: llm-api-keys
                resources:
                  requests:
                    memory: 512Mi
                    cpu: 250m
                  limits:
                    memory: 2Gi
                    cpu: 1000m
            volumes:
              - name: config
                configMap:
                  name: litellm-config
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm
        namespace: litellm
        annotations:
          metallb.io/loadBalancerIPs: "{{ litellm_service_ip }}"
      spec:
        type: LoadBalancer
        selector:
          app: litellm
        ports:
          - port: 80
            targetPort: 4000
            name: http

- name: Apply LiteLLM deployment
  ansible.builtin.command: kubectl apply -f /tmp/litellm-deploy.yml
  changed_when: true
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

- name: Print LiteLLM summary
  ansible.builtin.debug:
    msg:
      - "LiteLLM Gateway: http://{{ litellm_service_ip }}/v1"
      - "OpenAI-compatible endpoint for all your apps and agents"
      - "Models available: gemma3, mistral, openchat, claude-sonnet, claude-opus, gemini-pro, gemini-flash"
      - "Run 'make secrets' to configure your Anthropic and Gemini API keys"
