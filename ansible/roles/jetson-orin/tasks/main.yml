---
# Configures Nvidia Orin NX after JetPack 7 is flashed.
# Primary role: LLM inference (Gemma4, Mistral, OpenChat, NeMo)

- name: Install Docker and NVIDIA container toolkit
  ansible.builtin.apt:
    name: [docker.io, docker-compose-v2, nvidia-container-toolkit]
    state: present
    update_cache: true

- name: Configure Docker to use NVIDIA runtime by default
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        },
        "default-runtime": "nvidia"
      }
    mode: "0644"
  notify: Restart Docker

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true

- name: Enable Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

# ── Ollama ────────────────────────────────────────────────────────────────────
- name: Install Ollama
  ansible.builtin.shell: curl -fsSL https://ollama.ai/install.sh | sh
  args:
    creates: /usr/local/bin/ollama

- name: Deploy Ollama systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service
    content: |
      [Unit]
      Description=Ollama LLM Server (Orin NX)
      After=network-online.target
      Wants=network-online.target

      [Service]
      User={{ admin_user }}
      ExecStart=/usr/local/bin/ollama serve
      Restart=always
      RestartSec=3
      Environment="OLLAMA_HOST=0.0.0.0:{{ ollama_port }}"
      Environment="OLLAMA_MODELS=/home/{{ admin_user }}/.ollama/models"
      Environment="CUDA_VISIBLE_DEVICES=0"

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Restart Ollama

- name: Enable and start Ollama
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Ollama to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_port }}/api/tags"
    status_code: 200
  register: ollama_ready
  until: ollama_ready.status == 200
  retries: 15
  delay: 5
  become: false

- name: Pull Ollama models for Orin NX
  ansible.builtin.command: "ollama pull {{ item }}"
  loop: "{{ ollama_models_orin }}"
  become: false
  changed_when: true
  environment:
    OLLAMA_HOST: "http://localhost:{{ ollama_port }}"

# ── Open WebUI ────────────────────────────────────────────────────────────────
- name: Create Open WebUI directory
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/open-webui"
    state: directory
    owner: "{{ admin_user }}"
    mode: "0755"

- name: Deploy Open WebUI docker-compose
  ansible.builtin.copy:
    dest: "/home/{{ admin_user }}/open-webui/docker-compose.yml"
    owner: "{{ admin_user }}"
    mode: "0644"
    content: |
      services:
        open-webui:
          image: ghcr.io/open-webui/open-webui:main
          container_name: open-webui
          restart: unless-stopped
          ports:
            - "{{ open_webui_port }}:8080"
          volumes:
            - open-webui:/app/backend/data
          environment:
            - OLLAMA_BASE_URL=http://host.docker.internal:{{ ollama_port }}
            - WEBUI_SECRET_KEY=change-me-in-production
          extra_hosts:
            - "host.docker.internal:host-gateway"
      volumes:
        open-webui:

- name: Start Open WebUI
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "/home/{{ admin_user }}/open-webui"
  become: false
  changed_when: true

# ── Python ML stack ───────────────────────────────────────────────────────────
- name: Install Python ML dependencies
  ansible.builtin.apt:
    name: [python3-pip, python3-venv, python3-dev, libopenblas-dev]
    state: present

- name: Install Python ML packages in virtualenv
  ansible.builtin.pip:
    name:
      - torch
      - torchvision
      - transformers
      - accelerate
      - bitsandbytes
      - datasets
      - huggingface_hub
      - jupyterlab
      - numpy
      - pandas
      - scikit-learn
      - anthropic
      - google-generativeai
      - google-adk
      - langchain
      - langchain-anthropic
      - langgraph
      - llama-index
      - qdrant-client
      - ollama
    virtualenv: "/home/{{ admin_user }}/ml-env"
    virtualenv_command: python3 -m venv
  become: false

# ── Firewall ──────────────────────────────────────────────────────────────────
- name: Allow Ollama from cluster subnet
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"
    port: "{{ ollama_port }}"
    proto: tcp

- name: Allow Open WebUI from cluster subnet
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"
    port: "{{ open_webui_port }}"
    proto: tcp

- name: Print Orin NX summary
  ansible.builtin.debug:
    msg:
      - "Ollama API:    http://{{ ansible_host }}:{{ ollama_port }}"
      - "Open WebUI:    http://{{ ansible_host }}:{{ open_webui_port }}"
      - "Models:        {{ ollama_models_orin | join(', ') }}"
