---
- name: Check if cluster already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_conf

- name: Initialize control plane with kubeadm
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr={{ pod_cidr }}
    --service-cidr={{ service_cidr }}
    --node-name={{ inventory_hostname }}
    --upload-certs
  when: not kubeadm_conf.stat.exists
  changed_when: true

- name: Create .kube directory for admin user
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.kube"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Copy admin.conf to user kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ admin_user }}/.kube/config"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"

- name: Fetch kubeconfig to workstation
  ansible.builtin.fetch:
    src: "/home/{{ admin_user }}/.kube/config"
    dest: "~/.kube/turingpi-cluster1.conf"
    flat: true
  become: false

- name: Generate join command for workers
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command
  changed_when: true

- name: Share join command with worker nodes
  ansible.builtin.set_fact:
    k8s_join_command: "{{ join_command.stdout }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k8s_workers'] }}"

- name: Allow K8s API server port through UFW
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
