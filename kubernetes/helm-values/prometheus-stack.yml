# ARM64-tuned Prometheus + Grafana for RK1 nodes
grafana:
  admin:
    existingSecret: "monitoring-grafana"    # populated by the external-secrets role from Vault secret/grafana
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
  # RollingUpdate can deadlock a single-replica pod on a ReadWriteOnce PVC: the
  # new pod gets scheduled to a different node than the old one and can never
  # attach the volume while the old pod (never killed under RollingUpdate) still
  # holds it. Recreate avoids this by terminating the old pod first.
  deploymentStrategy:
    type: Recreate
  service:
    type: LoadBalancer
    loadBalancerIP: "10.0.0.37"
  # Community dashboards fetched by the chart's built-in sidecar
  # (grafana.sidecar.dashboards, enabled by default) from grafana.com by
  # gnetId — requires outbound internet from the Grafana pod.
  #
  # folderAnnotation: ConfigMaps carrying this annotation (set to a folder
  # name) get placed in that Grafana folder instead of the sidecar's default
  # "General" — used by the Longhorn/Node-Exporter-Full/MinIO ConfigMaps
  # (kubernetes/grafana-dashboards/) to land in "TuringPi" alongside every
  # other dashboard.
  sidecar:
    dashboards:
      folderAnnotation: grafana_folder
      # folderAnnotation alone only controls where the sidecar WRITES the
      # file (into a /tmp/dashboards/<folder>/ subdirectory) — Grafana's own
      # file-provisioner also needs this to translate that directory
      # structure into an actual dashboard folder assignment, otherwise it
      # falls back to the provider's static (empty/General) folder.
      provider:
        foldersFromFilesStructure: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "TuringPi"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      # Without an explicit "revision", the chart's dashboard-download init
      # container defaults to revision 1 (the oldest, not the latest) for
      # every gnetId — several of these are pinned below because revision 1
      # predates current metric-naming schemes and showed no/partial data.
      #
      # node-exporter-full, longhorn, and minio are NOT provisioned here —
      # every modern revision of the first two dashboards uses Grafana's
      # newer per-panel object-form datasource ref ("datasource":
      # {"type":"prometheus","uid":"${DS_PROMETHEUS}"}), which this chart's
      # download_dashboards.sh can't resolve (its sed substitution only
      # matches the old same-line "datasource": "...", string form —
      # confirmed live, hundreds of unresolved ${DS_PROMETHEUS} tokens
      # remained, causing "No data" on nearly every panel). MinIO's
      # datasource resolves fine, but its queries hardcode job="$scrape_jobs"
      # against a multi-select/include-all variable with no default, which
      # can never exact-match — confirmed live. All three are instead
      # provisioned as static, pre-fixed JSON via ConfigMaps the
      # grafana-sc-dashboard sidecar picks up automatically (annotated
      # grafana_folder=TuringPi so they land in the same folder as the rest)
      # — see kubernetes/grafana-dashboards/ and
      # ansible/playbooks/04-cluster-addons.yml.
      k3s-cluster:          { gnetId: 15282, datasource: Prometheus }
      kubernetes-pvcs:      { gnetId: 13646, datasource: Prometheus }
      ingress-nginx:        { gnetId: 9614,  datasource: Prometheus }
      # "Gitea" (13192) — no template variables, 15/16 referenced metrics
      # match our live Gitea metrics vs 12/14 for the previous 17802.
      gitea:                { gnetId: 13192, datasource: Prometheus }
      cilium:               { gnetId: 16611, datasource: Prometheus }

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi
    resources:
      requests: { memory: 512Mi, cpu: 250m }
      limits:   { memory: 1Gi,   cpu: 500m }

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { memory: 128Mi, cpu: 50m }
      limits:   { memory: 256Mi }
    # Mounts K8s Secret alertmanager-gmail-credentials (from Vault secret/alertmanager
    # via the external-secrets role) at
    # /etc/alertmanager/secrets/alertmanager-gmail-credentials/<key> — never inline
    # the Gmail app password in this file.
    secrets:
      - alertmanager-gmail-credentials
  config:
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "rajesh.pamulapati50@gmail.com"
      # prometheus-operator's Alertmanager config schema (v0.92.1, chart 87.12.1)
      # doesn't support smtp_auth_username_file (rejects it as an unknown field),
      # only smtp_auth_password_file — confirmed against the live cluster's
      # Alertmanager CR Reconciled condition. GMAIL_USER is the same public
      # address as smtp_from above, not a secret, so it's safe inline; only the
      # app password is pulled from the mounted Vault secret.
      smtp_auth_username: "rajesh.pamulapati50@gmail.com"
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-gmail-credentials/GMAIL_APP_PASSWORD
      smtp_require_tls: true
    route:
      receiver: gmail-notifications
      group_by: ["alertname", "severity"]
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: ["severity=\"critical\""]
          group_wait: 10s
          repeat_interval: 1h
        - matchers: ["severity=\"warning\""]
          group_wait: 5m
          repeat_interval: 6h
    receivers:
      - name: gmail-notifications
        email_configs:
          - to: "rajesh.pamulapati50@gmail.com"
            send_resolved: true

# Disable components not exposed by K3s by default
kubeEtcd:             { enabled: false }
kubeControllerManager: { enabled: false }
kubeScheduler:        { enabled: false }
kubeProxy:            { enabled: false }
nodeExporter:         { enabled: true }

# node-exporter's textfile collector — backs the TailscaleDown PrometheusRule via
# scripts/monitoring/tailscale-metrics.sh writing tailscale_up to this hostPath
# on rk1-control (see ansible/roles/common for the systemd timer).
prometheus-node-exporter:
  extraArgs:
    - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
  extraHostVolumeMounts:
    - name: textfile-collector
      hostPath: /var/lib/node_exporter/textfile_collector
      mountPath: /var/lib/node_exporter/textfile_collector
      readOnly: true
