---
# ansible/playbooks/02-kubernetes.yml
# Deploys a 3-node K3s cluster on RK1 nodes (slots 1, 2, 4). CNI (Cilium) is installed
# separately by 02b-cilium.yml — K3s comes up here with --flannel-backend=none, so nodes
# will register but stay NotReady until that playbook runs.

# ── Phase 1: OS prep on all RK1 nodes ────────────────────────────────────────
- name: Kubernetes OS prerequisites
  hosts: rk1_nodes
  become: true
  tags: [k8s-prep]

  tasks:
    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Remove swapfile if present
      ansible.builtin.shell: |
        swapoff -a
        rm -f /swapfile
        sed -i '/swapfile/d' /etc/fstab
      changed_when: false

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "overlay\nbr_netfilter\n"
        mode: "0644"

    - name: Set sysctl params for Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k8s.conf
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Install Helm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

# ── Phase 2: K3s server ───────────────────────────────────────────────────────
- name: Initialize K3s server
  hosts: k8s_control
  become: true
  tags: [k3s-server]
  roles:
    - role: k3s-server

# ── Phase 3: K3s agents join ──────────────────────────────────────────────────
- name: Join K3s agents
  hosts: k8s_workers
  become: true
  tags: [k3s-agents]
  roles:
    - role: k3s-agent
