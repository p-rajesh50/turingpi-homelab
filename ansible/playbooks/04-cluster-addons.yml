---
# ansible/playbooks/04-cluster-addons.yml
# MetalLB, Ingress-NGINX, Prometheus+Grafana, Headlamp, Portainer

- name: Deploy cluster networking and monitoring add-ons
  hosts: k8s_control
  become: false
  environment:
    KUBECONFIG: "/home/{{ admin_user }}/.kube/config"

  tasks:
    - name: Add required Helm repos
      ansible.builtin.command: "helm repo add {{ item.name }} {{ item.url }}"
      changed_when: true
      loop:
        - { name: metallb,              url: "https://metallb.github.io/metallb" }
        - { name: ingress-nginx,        url: "https://kubernetes.github.io/ingress-nginx" }
        - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }
        - { name: headlamp,             url: "https://kubernetes-sigs.github.io/headlamp/" }
        - { name: portainer,            url: "https://portainer.github.io/k8s/" }

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: true

    # ── MetalLB ──────────────────────────────────────────────────────────────
    - name: Install MetalLB
      ansible.builtin.command: >
        helm upgrade --install metallb metallb/metallb
        --namespace metallb-system --create-namespace --wait
      changed_when: true

    - name: Configure MetalLB IP pool
      ansible.builtin.copy:
        dest: /tmp/metallb-pool.yml
        content: |
          ---
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: cluster1-pool
            namespace: metallb-system
          spec:
            addresses:
              - {{ metallb_ip_range_cluster1 }}
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: cluster1-l2
            namespace: metallb-system
        mode: "0644"

    - name: Apply MetalLB pool
      ansible.builtin.command: kubectl apply -f /tmp/metallb-pool.yml
      changed_when: true

    # ── Ingress-NGINX ─────────────────────────────────────────────────────────
    - name: Install Ingress-NGINX
      ansible.builtin.command: >
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --namespace ingress-nginx --create-namespace
        --set controller.service.type=LoadBalancer
        --set controller.metrics.enabled=true
        --set controller.metrics.serviceMonitor.enabled=true
        --set controller.metrics.serviceMonitor.additionalLabels.release=monitoring
        --wait --timeout 10m
      changed_when: true

    # ── Prometheus + Grafana ──────────────────────────────────────────────────
    - name: Copy Prometheus Helm values to control plane
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../kubernetes/helm-values/prometheus-stack.yml"
        dest: /tmp/prometheus-stack.yml
        mode: "0644"

    # Longhorn and Node Exporter Full dashboards can't be provisioned via the
    # chart's gnetId/dashboards.default mechanism — every modern revision of
    # both uses a per-panel object-form datasource ref that the chart's sed-
    # based download_dashboards.sh can't resolve (see prometheus-stack.yml
    # comment). Instead they're loaded as pre-fixed static JSON via ConfigMaps
    # labeled grafana_dashboard=1, which the grafana-sc-dashboard sidecar
    # (part of the kube-prometheus-stack chart) watches for.
    #
    # These MUST be created before "Install kube-prometheus-stack" below —
    # the sidecar only does a one-time initial sync of matching ConfigMaps
    # when the Grafana pod starts, and its ongoing watch for ConfigMaps
    # created afterward isn't reliable (confirmed live: a ConfigMap created
    # after the Grafana pod was already running was missed until the pod was
    # manually restarted). Creating them first guarantees they're always
    # present at every Grafana pod startup, on any fresh `make addons` run.
    - name: Ensure monitoring namespace exists
      ansible.builtin.shell: >
        kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Copy Grafana dashboard JSON to control plane
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../kubernetes/grafana-dashboards/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - longhorn.json
        - node-exporter-full.json

    # node-exporter-full.json is ~680KB — kubectl apply's client-side
    # last-applied-configuration annotation has a 262144-byte cap and rejects
    # it ("Too long"), so this uses --server-side (no annotation) instead of
    # the usual dry-run|apply pattern.
    - name: Create Grafana sidecar-loaded dashboard ConfigMaps
      ansible.builtin.shell: >
        kubectl create configmap {{ item.name }}-grafana-dashboard
        --from-file={{ item.file }}=/tmp/{{ item.file }}
        --namespace monitoring
        --dry-run=client -o yaml | kubectl apply --server-side --force-conflicts -f -
      changed_when: true
      loop:
        - { name: longhorn, file: longhorn.json }
        - { name: node-exporter-full, file: node-exporter-full.json }

    - name: Label Grafana sidecar-loaded dashboard ConfigMaps
      ansible.builtin.command: >
        kubectl label configmap {{ item }}-grafana-dashboard
        grafana_dashboard=1
        --namespace monitoring --overwrite
      changed_when: true
      loop:
        - longhorn
        - node-exporter-full

    - name: Install kube-prometheus-stack
      ansible.builtin.command: >
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
        --namespace monitoring --create-namespace
        --values /tmp/prometheus-stack.yml
        --wait --timeout 10m
      changed_when: true

    # PrometheusRule CRDs — Alertmanager notification channel (Gmail SMTP) is
    # configured via prometheus-stack.yml's alertmanager.config; the Gmail app
    # password itself comes from Vault secret/alertmanager via the
    # alertmanager-gmail-credentials ExternalSecret (external-secrets role,
    # applied by `make vault`). Until that secret exists, Alertmanager will
    # show CreateContainerConfigError — expected until `make vault` runs.
    - name: Copy PrometheusRule manifests to control plane
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../kubernetes/prometheus-rules/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - critical-alerts.yml
        - high-alerts.yml
        - warning-alerts.yml

    - name: Apply PrometheusRule manifests
      ansible.builtin.command: "kubectl apply -f /tmp/{{ item }}"
      changed_when: true
      loop:
        - critical-alerts.yml
        - high-alerts.yml
        - warning-alerts.yml

    # ServiceMonitors for services not scraped by kube-prometheus-stack's own
    # defaults. Gitea requires gitea.metrics.enabled=true (ansible/roles/gitea)
    # and Cilium requires prometheus.enabled=true (make cilium) — both applied
    # separately before this; MinIO already ran with
    # MINIO_PROMETHEUS_AUTH_TYPE=public out of the box.
    - name: Copy ServiceMonitor manifests to control plane
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../kubernetes/service-monitors/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - minio-servicemonitor.yml
        - gitea-servicemonitor.yml
        - cilium-servicemonitor.yml
        - longhorn-servicemonitor.yml

    - name: Apply ServiceMonitor manifests
      ansible.builtin.command: "kubectl apply -f /tmp/{{ item }}"
      changed_when: true
      loop:
        - minio-servicemonitor.yml
        - gitea-servicemonitor.yml
        - cilium-servicemonitor.yml
        - longhorn-servicemonitor.yml

    # ── Headlamp ──────────────────────────────────────────────────────────────
    - name: Install Headlamp
      ansible.builtin.command: >
        helm upgrade --install headlamp headlamp/headlamp
        --namespace headlamp --create-namespace
        --set service.type=LoadBalancer
        --set service.loadBalancerIP={{ headlamp_service_ip }}
        --wait --timeout 10m
      changed_when: true

    # ServiceAccount + cluster-admin binding used to log into the Headlamp UI
    # with a token (separate from the chart's own default "headlamp" SA, which
    # the running pod uses and which must NOT be the login identity — binding
    # cluster-admin to the wrong SA here previously caused a CRD-list 403 even
    # though "cluster-admin" appeared to be granted). The metrics-reader
    # binding is redundant under cluster-admin but kept for clarity.
    - name: Create Headlamp admin RBAC
      ansible.builtin.copy:
        dest: /tmp/headlamp-admin-rbac.yml
        mode: "0644"
        content: |
          ---
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: headlamp-admin
            namespace: headlamp
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: headlamp-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: headlamp-admin
              namespace: headlamp
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: headlamp-admin-metrics-reader
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: system:aggregated-metrics-reader
          subjects:
            - kind: ServiceAccount
              name: headlamp-admin
              namespace: headlamp

    - name: Apply Headlamp admin RBAC
      ansible.builtin.command: kubectl apply -f /tmp/headlamp-admin-rbac.yml
      changed_when: true

    # ── Portainer ─────────────────────────────────────────────────────────────
    # Note: the portainer/portainer chart has no service.loadBalancerIP values
    # key — MetalLB IP is pinned via the metallb.io/loadBalancerIPs annotation.
    - name: Install Portainer
      ansible.builtin.command: >
        helm upgrade --install portainer portainer/portainer
        --namespace portainer --create-namespace
        --set service.type=LoadBalancer
        --set service.annotations."metallb\.io/loadBalancerIPs"={{ portainer_service_ip }}
        --wait --timeout 10m
      changed_when: true
