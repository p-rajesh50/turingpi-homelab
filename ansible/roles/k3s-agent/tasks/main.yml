---
- name: Check if Longhorn NVMe mount is present
  ansible.builtin.stat:
    path: /var/lib/longhorn-nvme
  register: longhorn_nvme_mount

- name: Check for pre-existing /var/lib/containerd and /var/lib/rancher
  ansible.builtin.stat:
    path: "/var/lib/{{ item }}"
  loop: [containerd, rancher]
  register: k3s_data_dirs

- name: Create NVMe-backed containerd/rancher directories (only when NVMe is
    already mounted and K3s hasn't written real data to eMMC yet)
  ansible.builtin.file:
    path: "/var/lib/longhorn-nvme/{{ item.item }}"
    state: directory
    mode: "0711"
  loop: "{{ k3s_data_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: longhorn_nvme_mount.stat.exists and longhorn_nvme_mount.stat.isdir and not item.stat.exists

- name: Symlink /var/lib/containerd and /var/lib/rancher to NVMe before K3s
    installs, so a fresh install writes there directly instead of the eMMC
  ansible.builtin.file:
    src: "/var/lib/longhorn-nvme/{{ item.item }}"
    dest: "/var/lib/{{ item.item }}"
    state: link
  loop: "{{ k3s_data_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: longhorn_nvme_mount.stat.exists and longhorn_nvme_mount.stat.isdir and not item.stat.exists

- name: Check if K3s agent already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent
  register: k3s_agent_bin

- name: Read node-token from rk1-control
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token_raw
  delegate_to: rk1-control
  when: not k3s_agent_bin.stat.exists

- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL=https://{{ k3s_server_ip }}:6443 \
      K3S_TOKEN={{ k3s_node_token_raw.content | b64decode | trim }} \
      sh -s - agent \
      --node-ip={{ ansible_host }}
  when: not k3s_agent_bin.stat.exists

- name: Wait for this node to register in the cluster
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  delegate_to: rk1-control
  register: k3s_agent_registered
  until: k3s_agent_registered.rc == 0
  retries: 24
  delay: 5
  changed_when: false
