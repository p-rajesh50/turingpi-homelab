---
- name: Fetch NFS service status from TrueNAS
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service?service=nfs"
    method: GET
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
      Content-Type: "application/json"
    validate_certs: "{{ truenas_validate_certs }}"
    status_code: 200
  register: nfs_service_status
  tags: [truenas, truenas-nfs]

- name: Enable NFS service to start on boot
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/id/{{ nfs_service_status.json[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      enable: true
    validate_certs: "{{ truenas_validate_certs }}"
    status_code: 200
  when: not nfs_service_status.json[0].enable
  tags: [truenas, truenas-nfs]

- name: Start NFS service if not running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/start"
    method: POST
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      service: "nfs"
    validate_certs: "{{ truenas_validate_certs }}"
    status_code: 200
  when: nfs_service_status.json[0].state != "RUNNING"
  tags: [truenas, truenas-nfs]

- name: Confirm NFS service is running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service?service=nfs"
    method: GET
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
      Content-Type: "application/json"
    validate_certs: "{{ truenas_validate_certs }}"
    status_code: 200
  register: nfs_service_confirm
  tags: [truenas, truenas-nfs]

- name: Assert NFS service is running
  ansible.builtin.assert:
    that: nfs_service_confirm.json[0].state == "RUNNING"
    fail_msg: "NFS service failed to start on TrueNAS — check TrueNAS logs"
    success_msg: "NFS service is running on TrueNAS"
  tags: [truenas, truenas-nfs]
