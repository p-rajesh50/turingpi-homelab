---
- name: Check if K3s agent already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent
  register: k3s_agent_bin

- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL=https://{{ k3s_server_ip }}:6443 \
      K3S_TOKEN={{ hostvars['rk1-control']['k3s_node_token'] }} \
      sh -s - agent \
      --node-ip={{ ansible_host }}
  when: not k3s_agent_bin.stat.exists

- name: Wait for this node to register in the cluster
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  delegate_to: rk1-control
  register: k3s_agent_registered
  until: k3s_agent_registered.rc == 0
  retries: 24
  delay: 5
  changed_when: false
