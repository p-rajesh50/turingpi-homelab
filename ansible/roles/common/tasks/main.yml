---
- name: Remove stale Tailscale APT source on worker nodes (Tailscale was purged
    here after the subnet-routing incident — see CLAUDE.md Remote Access — but
    the sources.list.d entry was left behind, pointing at a keyring file that no
    longer exists and causing apt-get update to fail GPG verification)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/tailscale.list
    state: absent
  when: inventory_hostname in groups['k8s_workers']

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Enable chrony (NTP)
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0600"
  notify: Restart SSH

- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow all cluster-internal traffic
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"

- name: Allow pod-network traffic (same-node kubelet self-scrape — pod-to-host
    traffic isn't masqueraded to a LAN IP the way cross-node traffic is, so it
    needs its own allow rule for the pod CIDR; without this, metrics-server
    times out scraping whichever node it happens to be scheduled on)
  community.general.ufw:
    rule: allow
    src: "{{ pod_cidr }}"

- name: Deploy fail2ban config
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      ignoreip = 127.0.0.1/8 ::1 10.0.0.0/24
      bantime  = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port    = ssh
      logpath = %(sshd_log)s
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Set locale
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Disable multipathd (no physical multipath storage here; it grabs Longhorn's
    iSCSI-backed virtual disks — vendor string "IET" — and locks them, breaking
    Longhorn volume formatting)
  ansible.builtin.systemd:
    name: multipathd
    enabled: false
    state: stopped
    masked: true

- name: Check for leftover standalone containerd.service (from the old kubeadm
    cluster; K3s embeds its own containerd and never uses this one)
  ansible.builtin.stat:
    path: /lib/systemd/system/containerd.service
  register: leftover_containerd_service

- name: Disable and mask leftover containerd.service
  ansible.builtin.systemd:
    name: containerd
    enabled: false
    state: stopped
    masked: true
  when: leftover_containerd_service.stat.exists

- name: Remove leftover containerd data directory (K3s embeds its own containerd
    under /var/lib/rancher/k3s/... — this top-level dir is pure kubeadm-era cruft)
  ansible.builtin.file:
    path: /var/lib/containerd
    state: absent
  when: leftover_containerd_service.stat.exists

# Longhorn's instance-manager expects this directory to already exist when
# starting a replica/engine process. If it's missing, replica start fails with
# "open /var/log/instances/<name>.log: no such file or directory" — hit during
# the Chunk 5 Gitea metrics rollout (see docs/runbook.md "Longhorn volume
# stuck attaching after pod recreation"). Applies to all 3 nodes since any of
# them can host Longhorn replicas.
- name: Ensure Longhorn instance log directory exists
  ansible.builtin.file:
    path: /var/log/instances
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Disable swap permanently via systemd (runs before kubelet on every boot)
  ansible.builtin.copy:
    dest: /etc/systemd/system/disable-swap.service
    content: |
      [Unit]
      Description=Disable swap permanently for Kubernetes
      DefaultDependencies=no
      Before=k3s.service k3s-agent.service
      After=local-fs.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/swapoff -a
      ExecStartPost=/bin/bash -c 'rm -f /swapfile /swap.img; sed -i "/swapfile/d;/swap.img/d;/\sswap\s/d" /etc/fstab'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Reload and enable disable-swap unit

# Tailscale only runs on rk1-control (see CLAUDE.md Remote Access — never
# reinstall on workers). Feeds node-exporter's textfile collector so the
# TailscaleDown PrometheusRule has a real metric to alert on.
- name: Create node-exporter textfile collector directory
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    mode: "0755"
  when: inventory_hostname in groups['k8s_control']

- name: Deploy tailscale-metrics.sh
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/monitoring/tailscale-metrics.sh"
    dest: /usr/local/bin/tailscale-metrics.sh
    mode: "0755"
  when: inventory_hostname in groups['k8s_control']

- name: Deploy tailscale-metrics systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/tailscale-metrics.service
    content: |
      [Unit]
      Description=Write tailscale_up metric for node-exporter textfile collector

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/tailscale-metrics.sh
    mode: "0644"
  when: inventory_hostname in groups['k8s_control']
  notify: Reload and enable tailscale-metrics timer

- name: Deploy tailscale-metrics systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/tailscale-metrics.timer
    content: |
      [Unit]
      Description=Run tailscale-metrics.sh every 60s

      [Timer]
      OnBootSec=30s
      OnUnitActiveSec=60s

      [Install]
      WantedBy=timers.target
    mode: "0644"
  when: inventory_hostname in groups['k8s_control']
  notify: Reload and enable tailscale-metrics timer
