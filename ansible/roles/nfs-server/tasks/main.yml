---
# Only runs on the node with nfs_server: true (rk1-worker-2, slot 4)
# Formats /dev/sda (512GB SATA SSD) and exports it as NFS

- name: Skip if not NFS server
  ansible.builtin.meta: end_host
  when: not (nfs_server | default(false))

- name: Install NFS server
  ansible.builtin.apt:
    name: [nfs-kernel-server, parted, e2fsprogs]
    state: present

- name: Check if SATA device is already formatted
  ansible.builtin.command: "blkid {{ nfs_sata_device }}"
  register: blkid_result
  changed_when: false
  failed_when: false

- name: Create partition table on SATA SSD (first time only)
  ansible.builtin.command: "parted -s {{ nfs_sata_device }} mklabel gpt mkpart primary ext4 0% 100%"
  when: blkid_result.rc != 0
  changed_when: true

- name: Wait for kernel to register new partition
  ansible.builtin.command: "partprobe {{ nfs_sata_device }} && udevadm settle"
  when: blkid_result.rc != 0
  changed_when: false

- name: Format SATA SSD as ext4 (first time only)
  ansible.builtin.command: "mkfs.ext4 -F {{ nfs_sata_device }}1"
  when: blkid_result.rc != 0
  changed_when: true

- name: Create SATA mount point
  ansible.builtin.file:
    path: "{{ nfs_sata_mount }}"
    state: directory
    mode: "0755"

- name: Mount SATA SSD
  ansible.posix.mount:
    path: "{{ nfs_sata_mount }}"
    src: "{{ nfs_sata_device }}1"
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Create NFS export directory on SATA
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

- name: Configure NFS export
  ansible.builtin.lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_path }} {{ cluster_subnet }}(rw,sync,no_subtree_check,no_root_squash)"
    state: present
  notify: Export NFS shares

- name: Enable NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    enabled: true
    state: started

- name: Allow NFS through UFW
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"
    port: "2049"
    proto: tcp
