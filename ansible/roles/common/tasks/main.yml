---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Enable chrony (NTP)
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0600"
  notify: Restart SSH

- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow all cluster-internal traffic
  community.general.ufw:
    rule: allow
    src: "{{ cluster_subnet }}"

- name: Deploy fail2ban config
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      ignoreip = 127.0.0.1/8 ::1 10.0.0.0/24
      bantime  = 1h
      findtime = 10m
      maxretry = 5

      [sshd]
      enabled = true
      port    = ssh
      logpath = %(sshd_log)s
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Set locale
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Disable swap permanently via systemd (runs before kubelet on every boot)
  ansible.builtin.copy:
    dest: /etc/systemd/system/disable-swap.service
    content: |
      [Unit]
      Description=Disable swap permanently for Kubernetes
      DefaultDependencies=no
      Before=k3s.service k3s-agent.service
      After=local-fs.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/swapoff -a
      ExecStartPost=/bin/bash -c 'rm -f /swapfile /swap.img; sed -i "/swapfile/d;/swap.img/d;/\sswap\s/d" /etc/fstab'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Reload and enable disable-swap unit
