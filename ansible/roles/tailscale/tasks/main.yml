---
# ansible/roles/tailscale/tasks/main.yml
# Installs Tailscale on the RK1 cluster nodes.
# Enables subnet routing on rk1-control so your laptop can reach
# the entire 10.0.0.0/24 network via one Tailscale connection.
#
# PREREQUISITE: TAILSCALE_AUTH_KEY must be stored in Vault:
#   vault kv put secret/tailscale AUTH_KEY="tskey-auth-..."
# The key MUST be reusable, not single-use — this same key is used for
# `tailscale up` on all 3 nodes within one playbook run, so a single-use key
# would leave 2 of 3 nodes unable to connect.

- name: Add Tailscale apt repo key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg | \
      tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu jammy main"
    state: present
    filename: tailscale

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if already connected to Tailscale
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Enable IP forwarding for Tailscale subnet routing
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: inventory_hostname == 'rk1-control'

- name: Connect to Tailscale network
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --hostname={{ inventory_hostname }}
    --accept-routes
    {% if inventory_hostname == 'rk1-control' %}
    --advertise-routes=10.0.0.0/24 --snat-subnet-routes=false
    {% endif %}
  when: (tailscale_status.stdout | from_json).BackendState != 'Running'
  changed_when: true
  no_log: true    # Don't log the auth key

- name: Get Tailscale IP
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Allow Tailscale through UFW
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Print Tailscale summary
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} Tailscale IP: {{ tailscale_ip.stdout }}"
