---
- name: Add Longhorn Helm repo
  ansible.builtin.command: helm repo add longhorn https://charts.longhorn.io
  changed_when: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Install Longhorn
  ansible.builtin.command: >
    helm upgrade --install longhorn longhorn/longhorn
    --namespace longhorn-system
    --create-namespace
    --version {{ longhorn_version }}
    --values /tmp/longhorn-values.yml
    --wait --timeout 10m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Write Longhorn Helm values
  ansible.builtin.copy:
    dest: /tmp/longhorn-values.yml
    content: |
      defaultSettings:
        defaultReplicaCount: {{ longhorn_replica_count }}
        defaultDataPath: {{ longhorn_storage_path }}
        storageMinimalAvailablePercentage: 10
        storageReservedPercentageForDefaultDisk: 5
        nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      persistence:
        defaultClass: true
        defaultClassReplicaCount: {{ longhorn_replica_count }}
      ingress:
        enabled: false     # Access via kubectl port-forward or ingress later
    mode: "0644"

- name: Add NFS provisioner Helm repo
  ansible.builtin.command: >
    helm repo add nfs-subdir-external-provisioner
    https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
  changed_when: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Install NFS StorageClass provisioner
  ansible.builtin.command: >
    helm upgrade --install nfs-provisioner
    nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    --namespace kube-system
    --set nfs.server={{ nfs_server_ip }}
    --set nfs.path={{ nfs_export_path }}
    --set storageClass.name=nfs-shared
    --set storageClass.defaultClass=false
    --wait
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Print storage summary
  ansible.builtin.debug:
    msg:
      - "Longhorn UI:     kubectl port-forward -n longhorn-system svc/longhorn-frontend 8080:80"
      - "StorageClasses:  longhorn (default, NVMe replicated) | nfs-shared (SATA, shared)"
