---
- name: Check if Longhorn NVMe mount is present (control-plane doesn't get one by
    design — this task set safely no-ops there)
  ansible.builtin.stat:
    path: /var/lib/longhorn-nvme
  register: longhorn_nvme_mount

- name: Check for pre-existing /var/lib/containerd and /var/lib/rancher
  ansible.builtin.stat:
    path: "/var/lib/{{ item }}"
  loop: [containerd, rancher]
  register: k3s_data_dirs

- name: Create NVMe-backed containerd/rancher directories (only when NVMe is
    already mounted and K3s hasn't written real data to eMMC yet)
  ansible.builtin.file:
    path: "/var/lib/longhorn-nvme/{{ item.item }}"
    state: directory
    mode: "0711"
  loop: "{{ k3s_data_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: longhorn_nvme_mount.stat.exists and longhorn_nvme_mount.stat.isdir and not item.stat.exists

- name: Symlink /var/lib/containerd and /var/lib/rancher to NVMe before K3s
    installs, so a fresh install writes there directly instead of the eMMC
  ansible.builtin.file:
    src: "/var/lib/longhorn-nvme/{{ item.item }}"
    dest: "/var/lib/{{ item.item }}"
    state: link
  loop: "{{ k3s_data_dirs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: longhorn_nvme_mount.stat.exists and longhorn_nvme_mount.stat.isdir and not item.stat.exists

- name: Install K3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_KUBECONFIG_MODE="644" \
      sh -s - server \
      --disable traefik \
      --disable servicelb \
      --flannel-backend=none \
      --disable-network-policy \
      --cluster-cidr={{ pod_cidr }} \
      --service-cidr={{ service_cidr }} \
      --node-ip={{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s

- name: Wait for node-token to exist
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Wait for control-plane node to register
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  register: k3s_node_registered
  until: k3s_node_registered.rc == 0
  retries: 24
  delay: 5
  changed_when: false

- name: Ensure admin user's .kube directory exists
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.kube"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0700"

- name: Copy K3s kubeconfig to admin user's default kubectl/Helm location
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ admin_user }}/.kube/config"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"

- name: Fetch kubeconfig to workstation
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/.kube/turingpi-cluster1.conf
    flat: true
  become: false

- name: Point fetched kubeconfig at the real server IP
  ansible.builtin.replace:
    path: "{{ lookup('env', 'HOME') }}/.kube/turingpi-cluster1.conf"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  become: false
  delegate_to: localhost

- name: Allow K3s API server port through UFW
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
