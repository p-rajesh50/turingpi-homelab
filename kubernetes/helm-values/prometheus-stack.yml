# ARM64-tuned Prometheus + Grafana for RK1 nodes
grafana:
  admin:
    existingSecret: "monitoring-grafana"    # populated by the external-secrets role from Vault secret/grafana
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
  # RollingUpdate can deadlock a single-replica pod on a ReadWriteOnce PVC: the
  # new pod gets scheduled to a different node than the old one and can never
  # attach the volume while the old pod (never killed under RollingUpdate) still
  # holds it. Recreate avoids this by terminating the old pod first.
  deploymentStrategy:
    type: Recreate
  service:
    type: LoadBalancer
    loadBalancerIP: "10.0.0.37"

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi
    resources:
      requests: { memory: 512Mi, cpu: 250m }
      limits:   { memory: 1Gi,   cpu: 500m }

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { memory: 128Mi, cpu: 50m }
      limits:   { memory: 256Mi }

# Disable components not exposed by K3s by default
kubeEtcd:             { enabled: false }
kubeControllerManager: { enabled: false }
kubeScheduler:        { enabled: false }
kubeProxy:            { enabled: false }
nodeExporter:         { enabled: true }
